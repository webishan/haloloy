version: '3.8'

services:
  # Frontend Service
  frontend:
    build: ./services/frontend-service
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://localhost:3000
    networks:
      - komarce-network

  # API Gateway
  api-gateway:
    build: ./services/api-gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - komarce-network

  # Payment Service
  payment-service:
    build: ./services/payment-service
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=production
      - PORT=3005
    networks:
      - komarce-network

  # Loyalty Service
  loyalty-service:
    build: ./services/loyalty-service
    ports:
      - "3006:3006"
    environment:
      - NODE_ENV=production
      - PORT=3006
    networks:
      - komarce-network

  # Notification Service
  notification-service:
    build: ./services/notification-service
    ports:
      - "3007:3007"
    environment:
      - NODE_ENV=production
      - PORT=3007
    networks:
      - komarce-network

  # Analytics Service
  analytics-service:
    build: ./services/analytics-service
    ports:
      - "3008:3008"
    environment:
      - NODE_ENV=production
      - PORT=3008
    networks:
      - komarce-network

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api-gateway
    networks:
      - komarce-network

networks:
  komarce-network:
    driver: bridge
