version: '3.8'

services:
  # Frontend Service (using the original client)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://localhost:5000
    networks:
      - komarce-network

  # API Gateway
  api-gateway:
    build: ./services/api-gateway
    ports:
      - "5000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - komarce-network

  # Payment Service
  payment-service:
    build: ./services/payment-service
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=production
      - PORT=3005
    networks:
      - komarce-network

  # Loyalty Service
  loyalty-service:
    build: ./services/loyalty-service
    ports:
      - "3006:3006"
    environment:
      - NODE_ENV=production
      - PORT=3006
    networks:
      - komarce-network

  # Notification Service
  notification-service:
    build: ./services/notification-service
    ports:
      - "3007:3007"
    environment:
      - NODE_ENV=production
      - PORT=3007
    networks:
      - komarce-network

  # Analytics Service
  analytics-service:
    build: ./services/analytics-service
    ports:
      - "3008:3008"
    environment:
      - NODE_ENV=production
      - PORT=3008
    networks:
      - komarce-network

networks:
  komarce-network:
    driver: bridge
